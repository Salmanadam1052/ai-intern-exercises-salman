<!DOCTYPE html>
<html>
<head>
  <title>Qwen Chat UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 700px;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      background: #1e293b;
      margin-bottom: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.4;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">

    <h2>💬 Qwen Chat</h2>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
      <input id="input" placeholder="Type your message..." />
      <button onclick="send()">Send</button>
    </div>

  </div>

<script>
const API = "http://localhost:8000";

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.classList.add("msg", type);
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Thinking...", "bot");

  try {
    const res = await fetch(API + "/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: text })
    });

    const data = await res.json();

    // remove "Thinking..."
    const chat = document.getElementById("chat");
    chat.lastChild.remove();

    addMessage(data.response, "bot");

  } catch (err) {
    addMessage("Error connecting to server", "bot");
  }
}
</script>

</body>
</html>
